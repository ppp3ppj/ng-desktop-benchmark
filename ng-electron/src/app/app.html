<div class="navbar bg-base-200 shadow-sm px-4 h-16">
  <div class="flex-1 gap-2">
    <span class="font-bold text-lg">ng-electron</span>
    <ul class="menu menu-horizontal menu-sm p-0">
      <li>
        <a routerLink="/" routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }">Home</a>
      </li>
      <li>
        <a routerLink="/todo" routerLinkActive="active">Todos</a>
      </li>
    </ul>
  </div>

  <div class="flex-none flex items-center gap-2">
    <span class="text-sm text-base-content/60 hidden sm:block">Theme</span>
    <select class="select select-sm select-bordered" (change)="setTheme($event)">
      @for (t of themeService.themes; track t) {
        <option [value]="t" [selected]="themeService.theme() === t">
          {{ t | titlecase }}
        </option>
      }
    </select>
  </div>
</div>

<router-outlet />
