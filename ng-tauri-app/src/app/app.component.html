<div class="min-h-screen bg-base-100">
  <nav class="navbar bg-base-200 shadow-sm px-4">
    <div class="flex-1 gap-4">
      <a routerLink="/" class="text-xl font-bold text-primary">NgTauri</a>
      <a routerLink="/todos" routerLinkActive="text-primary font-semibold" class="btn btn-ghost btn-sm">
        <i class="ri-checkbox-multiple-line"></i> Todos
      </a>
    </div>
    <div class="flex-none">
      <select
        class="select select-bordered select-sm"
        [ngModel]="themeService.current()"
        (ngModelChange)="onThemeChange($event)"
      >
        @for (theme of themeService.availableThemes; track theme) {
          <option [value]="theme">{{ theme }}</option>
        }
      </select>
    </div>
  </nav>

  <router-outlet />
</div>
